<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://w3.org">
  <!-- Fondo Circular Suave -->
  <circle cx="200" cy="200" r="150" fill="#f9f9f9" />
  
  <!-- Animación de Pulso para el fondo -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#a67c52" stroke-width="2" opacity="0.3">
    <animate attributeName="r" from="150" to="180" dur="2s" begin="0s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" begin="0s" repeatCount="indefinite" />
  </circle>

  <!-- Icono de Construcción (Llave y Martillo minimalistas) -->
  <g fill="#2c3e50">
    <path d="M230,160 L170,220 M185,160 L160,185 M215,240 L240,215" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
    <rect x="180" y="180" width="40" height="40" rx="5" transform="rotate(45 200 200)" />
  </g>

  <!-- Engranajes Animados -->
  <g fill="#a67c52">
    <!-- Engranaje Grande -->
    <path d="M260,260 L270,250 M260,240 L270,230 M240,260 L230,270" stroke="#a67c52" stroke-width="8">
      <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="8s" repeatCount="indefinite" />
    </path>
    <circle cx="250" cy="250" r="15" />
    
    <!-- Engranaje Pequeño -->
    <circle cx="150" cy="150" r="10">
      <animateTransform attributeName="transform" type="rotate" from="360 150 150" to="0 150 150" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Texto Curvo (Opcional) -->
  <defs>
    <path id="textPath" d="M100,200 A100,100 0 1,1 300,200" />
  </defs>
  <text fill="#2c3e50" font-family="Montserrat, sans-serif" font-size="14" font-weight="bold" letter-spacing="2">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">
      CASA EL CEDRO • PRÓXIMAMENTE • 
    </textPath>
  </text>
</svg>
