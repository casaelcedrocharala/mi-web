<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://w3.org">
  <circle cx="200" cy="200" r="160" fill="#fcfcfc" stroke="#f0f0f0" stroke-width="2"/>
  <g stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5">
    <line x1="100" y1="200" x2="300" y2="200" />
    <line x1="200" y1="100" x2="200" y2="300" />
  </g>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#a67c52" stroke-width="1" opacity="0.4">
    <animate attributeName="r" from="140" to="160" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.4" to="0" dur="3s" repeatCount="indefinite" />
  </circle>
  <g transform="translate(140, 150)">
    <path d="M10,60 L60,10 L110,60 L110,110 L10,110 Z" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
    <rect x="45" y="55" width="30" height="30" fill="none" stroke="#a67c52" stroke-width="3">
        <animate attributeName="stroke-dasharray" from="0,120" to="120,0" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>
  <text x="200" y="340" fill="#a67c52" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">
    MEJORANDO PARA TI
  </text>
</svg>
